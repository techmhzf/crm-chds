services:
  - type: web
    name: chds-crm-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # set manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: CLIENT_URL
        sync: false          # set to your Vercel URL after deploying frontend
