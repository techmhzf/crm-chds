<!DOCTYPE html>
<html>
<head><title>Generate Extension Icons</title></head>
<body style="font-family:sans-serif;background:#000;color:#fff;padding:24px;">
<h3>Generating CHDS Chrome Extension Icons from logo.svg...</h3>
<p style="color:#888;font-size:13px;">Three files will download automatically. Move them to the <strong style="color:#fff">chrome-extension/</strong> folder.</p>
<div id="status"></div>
<script>
  const sizes = [16, 48, 128];
  let downloaded = 0;

  const img = new Image();
  img.onload = () => {
    sizes.forEach((size, i) => {
      setTimeout(() => generate(size, img), i * 400);
    });
  };
  img.onerror = () => {
    document.getElementById('status').innerHTML =
      '<p style="color:#f87171;">Failed to load logo.svg — make sure this HTML file is in the same folder as logo.svg.</p>';
  };
  img.src = 'logo.svg';

  function generate(size, svgImg) {
    const canvas = document.createElement('canvas');
    canvas.width = canvas.height = size;
    const ctx = canvas.getContext('2d');

    // Black rounded-rect background
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    const r = size * 0.15;
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fill();

    // Draw the SVG logo centered with padding
    const pad = size * 0.1;
    const drawSize = size - pad * 2;
    ctx.drawImage(svgImg, pad, pad, drawSize, drawSize);

    const a = document.createElement('a');
    a.download = `icon${size}.png`;
    a.href = canvas.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    downloaded++;
    if (downloaded === sizes.length) {
      document.getElementById('status').innerHTML = `
        <div style="background:#0a1a0a;border:1px solid rgba(74,222,128,0.3);border-radius:10px;padding:16px;margin-top:20px;">
          <p style="color:#4ade80;font-size:14px;font-weight:600;margin:0 0 8px">✓ Done! Three files downloaded:</p>
          <p style="color:#888;font-size:12px;margin:0">icon16.png, icon48.png, and icon128.png</p>
          <p style="color:#888;font-size:12px;margin:8px 0 0">Move all files into the <strong style="color:#fff">chrome-extension/</strong> folder, then reload the extension in Chrome.</p>
        </div>`;
    }
  }
</script>
</body>
</html>
